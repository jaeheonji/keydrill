[general]
# Remap QWERTY physical key positions to the selected layout.
# Useful if your OS is set to QWERTY but you want to practice another layout.
qwerty_remap = false

# Extra layout files or directories to load.
# Paths can be absolute or relative to the working directory.
# Directories are scanned for .toml files.
layouts = [
    "~/my-layouts/custom.toml",
    "~/my-layouts/extras/",
]

[theme]
# Supports: named colors (red, blue, dark_gray, light_cyan, ...),
#           256-color index (0-255), hex RGB (#rrggbb)
title = "blue"
secondary = "dark_gray"
selected = "blue"
highlight = "yellow"
correct = "green"
incorrect = "red"
active_border = "white"
